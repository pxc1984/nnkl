services:
  nginx:
    build:
      context: nginx
    ports:
      - "9689:80"
    depends_on:
      - backend
      - frontend
      - ocr
    restart: unless-stopped

  backend:
    build:
      context: backend
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: frontend
    restart: unless-stopped
    depends_on:
      - backend

  ocr:
    build:
      context: ocr
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      TEMP_DIR: ${OCR_TEMP_DIR}
      DOCLING_USE_GPU: ${OCR_DOCLING_USE_GPU}
      DOCLING_DO_FORMULA_ENRICHMENT: ${OCR_DOCLING_DO_FORMULA_ENRICHMENT}
      API_PREFIX: ${OCR_API_PREFIX}
      LOG_LEVEL: ${OCR_LOG_LEVEL}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres_data:

services:
  nginx:
    build:
      context: nginx
    ports:
      - "9689:80"
    depends_on:
      - backend
      - frontend
      - ocr
    restart: unless-stopped

  backend:
    build:
      context: backend
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      lightrag:
        condition: service_healthy

  frontend:
    build:
      context: frontend
    restart: unless-stopped
    depends_on:
      - backend

  ocr:
    build:
      context: ocr
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      OCR_TEMP_DIR: ${OCR_TEMP_DIR}
      OCR_MINERU_USE_GPU: ${OCR_MINERU_USE_GPU}
      OCR_MINERU_BACKEND: ${OCR_MINERU_BACKEND}
      OCR_MINERU_DOCUMENT_TIMEOUT_SECONDS: ${OCR_MINERU_DOCUMENT_TIMEOUT_SECONDS}
      OCR_MINERU_PREPROCESS_SCANS: ${OCR_MINERU_PREPROCESS_SCANS}
      OCR_MINERU_SCAN_DPI: ${OCR_MINERU_SCAN_DPI}
      OCR_MINERU_MAX_PAGE_MEGAPIXELS: ${OCR_MINERU_MAX_PAGE_MEGAPIXELS}
      OCR_NATIVE_MIN_CHARACTERS: ${OCR_NATIVE_MIN_CHARACTERS}
      OCR_NATIVE_MINIMUM_USABLE_PAGE_RATIO: ${OCR_NATIVE_MINIMUM_USABLE_PAGE_RATIO}
      MINERU_MODEL_SOURCE: ${MINERU_MODEL_SOURCE}
      OCR_API_PREFIX: ${OCR_API_PREFIX}
      OCR_LOG_LEVEL: ${OCR_LOG_LEVEL}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

  db:
    build:
      context: postgres
    env_file:
      - .env
    command: ["postgres", "-c", "shared_preload_libraries=age"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  lightrag:
    image: nnkl-lightrag:local
    build:
      context: lightrag
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 9621
      INPUT_DIR: /app/data/inputs
      WORKING_DIR: /app/data/rag_storage
      PROMPT_DIR: /app/data/prompts
      LLM_BINDING: ${LIGHTRAG_LLM_BINDING}
      LLM_BINDING_HOST: ${LIGHTRAG_LLM_BINDING_HOST}
      LLM_BINDING_API_KEY: ${LIGHTRAG_LLM_BINDING_API_KEY}
      LLM_MODEL: ${LIGHTRAG_LLM_MODEL}
      LLM_TIMEOUT: ${LIGHTRAG_LLM_TIMEOUT}
      EMBEDDING_BINDING: ${LIGHTRAG_EMBEDDING_BINDING}
      EMBEDDING_BINDING_HOST: ${LIGHTRAG_EMBEDDING_BINDING_HOST}
      EMBEDDING_BINDING_API_KEY: ${LIGHTRAG_EMBEDDING_BINDING_API_KEY}
      EMBEDDING_MODEL: ${LIGHTRAG_EMBEDDING_MODEL}
      EMBEDDING_DIM: ${LIGHTRAG_EMBEDDING_DIM}
      EMBEDDING_TOKEN_LIMIT: ${LIGHTRAG_EMBEDDING_TOKEN_LIMIT}
      EMBEDDING_SEND_DIM: ${LIGHTRAG_EMBEDDING_SEND_DIM}
      EMBEDDING_USE_BASE64: ${LIGHTRAG_EMBEDDING_USE_BASE64}
      SUMMARY_LANGUAGE: ${LIGHTRAG_SUMMARY_LANGUAGE}
      MAX_ASYNC_LLM: ${LIGHTRAG_MAX_ASYNC_LLM}
      MAX_PARALLEL_INSERT: ${LIGHTRAG_MAX_PARALLEL_INSERT}
      EMBEDDING_FUNC_MAX_ASYNC: ${LIGHTRAG_EMBEDDING_FUNC_MAX_ASYNC}
      EMBEDDING_BATCH_NUM: ${LIGHTRAG_EMBEDDING_BATCH_NUM}
      LIGHTRAG_KV_STORAGE: PGKVStorage
      LIGHTRAG_DOC_STATUS_STORAGE: PGDocStatusStorage
      LIGHTRAG_GRAPH_STORAGE: PGGraphStorage
      LIGHTRAG_VECTOR_STORAGE: PGVectorStorage
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DATABASE: ${POSTGRES_DB}
      POSTGRES_SSL_MODE: ${POSTGRES_SSLMODE}
      POSTGRES_VECTOR_INDEX_TYPE: ${LIGHTRAG_POSTGRES_VECTOR_INDEX_TYPE}
      POSTGRES_HNSW_M: ${LIGHTRAG_POSTGRES_HNSW_M}
      POSTGRES_HNSW_EF: ${LIGHTRAG_POSTGRES_HNSW_EF}
      POSTGRES_IVFFLAT_LISTS: ${LIGHTRAG_POSTGRES_IVFFLAT_LISTS}
      WORKSPACE: ${LIGHTRAG_WORKSPACE}
    ports:
      - "19621:9621"
    volumes:
      - ./lightrag/inputs:/app/data/inputs
      - ./lightrag/prompts:/app/data/prompts
      - ./lightrag/rag_storage:/app/data/rag_storage
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9621/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  rustfs:
    image: rustfs/rustfs:latest
    env_file:
      - .env
    environment:
      RUSTFS_VOLUMES: /data/rustfs{0...3}
      RUSTFS_ADDRESS: 0.0.0.0:9000
      RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS: "*"
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY}
      RUSTFS_OBS_LOGGER_LEVEL: ${RUSTFS_LOG_LEVEL}
      RUSTFS_UNSAFE_BYPASS_DISK_CHECK: ${RUSTFS_UNSAFE_BYPASS_DISK_CHECK:-false}
    volumes:
      - rustfs_data_0:/data/rustfs0
      - rustfs_data_1:/data/rustfs1
      - rustfs_data_2:/data/rustfs2
      - rustfs_data_3:/data/rustfs3
      - rustfs_logs:/app/logs
    healthcheck:
      test:
        [
          "CMD",
          "sh", "-ec",
          "curl -fsS http://127.0.0.1:9000/health && curl -fsS http://127.0.0.1:9001/rustfs/console/health"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

volumes:
  postgres_data:
  rustfs_data_0:
  rustfs_data_1:
  rustfs_data_2:
  rustfs_data_3:
  rustfs_logs:

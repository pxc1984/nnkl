name: Deploy

on:
  workflow_dispatch:
  workflow_run:
    workflows: ['Format & Test']
    types: [completed]
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    environment:
      name: production
    permissions:
      actions: read
      contents: read

    steps:
      - name: Resolve tested commit
        id: resolve-ref
        if: github.event_name == 'workflow_run'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sha=$(gh api repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }} --jq '.head_sha')
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || steps.resolve-ref.outputs.sha }}

      - name: Set up SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          KNOWN_HOSTS: ${{ secrets.KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Sync files to server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh "$SSH_USER@$SSH_HOST" "mkdir -p '$DEPLOY_PATH'"
          rsync -avz --delete --progress \
            docker-compose.yml \
            .env.example \
            backend \
            frontend \
            nginx \
            "$SSH_USER@$SSH_HOST:$DEPLOY_PATH"

      - name: Deploy to server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          ENV: ${{ secrets.ENV }}
        run: |
          ssh "$SSH_USER@$SSH_HOST" "printf '%s\n' \"$ENV\" > '$DEPLOY_PATH/.env'"
          ssh "$SSH_USER@$SSH_HOST" "cd '$DEPLOY_PATH' && docker compose down || true"
          ssh "$SSH_USER@$SSH_HOST" "cd '$DEPLOY_PATH' && docker compose -f docker-compose.yml up -d --build"

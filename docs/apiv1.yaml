# ============================================
# 🟢 Желательные доработки (Observability & Admin)
# ============================================
# Рекомендуется добавить в следующих итерациях:
#
# 1. GET /api/health/live
#    Kubernetes liveness probe. Возвращает 200 если процесс запущен.
#
# 2. GET /api/health/ready
#    Kubernetes readiness probe. Возвращает 200 только если БД, очередь и
#    ML-модели (embeddings + LLM) доступны. Иначе 503.
#
# 3. GET /api/v1/admin/stats
#    Админ-эндпоинт: количество документов, токенов, пользователей,
#    среднее время индексации, размер векторного хранилища.
#    Требует роль admin.
#
# 4. GET /api/v1/admin/audit-log
#    Пагинированный лог действий: кто загрузил / удалил / обновил документ,
#    кто создал пользователя, с какого IP. Требует роль admin.
#
# 5. GET /api/v1/ask/usage
#    Квоты и потребление LLM для текущего пользователя:
#    { usedTokens, maxTokens, usedRequests, maxRequests, resetDate }.
#
# 6. WebSocket стриминг (в перспективе)
#    wss://nnkl.iamamaev.ru/api/v1/ask/stream
#    Протокол: JSON-фреймы. Клиент отправляет { sessionId, message }.
#    Сервер стримит чанки ответа: { type: "chunk", content: "..." }
#    Завершение: { type: "done", citations: [...] }
#    Ошибка: { type: "error", message: "..." }
#
# ============================================
# 🔵 Модельные правки (Schema refinements)
# ============================================
#
# 1. KnowledgeObjectDetails.content
#    Для больших документов (>100KB чистого текста) рекомендуется
#    поддержать ?format=raw|preview. Preview возвращает первые N символов
#    или оглавление, чтобы не тащить мегабайты в JSON.
#
# 2. UserProfile
#    Добавлены lastLoginAt и updatedAt. Рекомендуется также добавить
#    { department, position } если интеграция с корпоративным LDAP/AD.
#
# 3. DataUploadParams
#    Добавлены extractImages (для multimodal RAG в будущем) и ocrLanguage.
#    Рассмотреть добавление: splitStrategy (recursive|semantic|fixed),
#    chunkSize, chunkOverlap — для тонкой настройки chunking'а.
#
# 4. AskRequest
#    Добавлены temperature и stream (boolean). Рассмотреть:
#    - model: string (выбор модели, если поддерживается несколько)
#    - maxTokens: integer (ограничение длины ответа)
#    - responseFormat: "markdown" | "json" (для структурированного вывода)
#
# 5. Глобальные заголовки
#    Все эндпоинты (кроме публичных /health, /login, /register)
#    должны поддерживать:
#    - X-Request-ID (tracing)
#    - Accept-Language (i18n ответов LLM и ошибок)
#
# 6. Rate Limiting
#    Рекомендуется реализовать на уровне middleware:
#    - /auth/*: 5 req/min per IP
#    - /ask: 20 req/min per user
#    - /data (POST): 10 req/min per user
#    Заголовки ответа: X-RateLimit-Limit, X-RateLimit-Remaining,
#    X-RateLimit-Reset, Retry-After (при 429).
#
# 7. ETag / If-None-Match
#    Для GET /api/v1/data/{id} и GET /api/v1/users/{id}
#    добавить ETag на основе updatedAt. Снижает нагрузку при повторных
#    запросах одного и того же документа.
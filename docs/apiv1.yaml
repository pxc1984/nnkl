openapi: 3.1.0
info:
  title: Норникель База Знаний
  description: Норникель База Знаний
  version: 1.0.0
servers:
- url: 'https://nnkl.iamamaev.online'
paths:
  /api/health:
    get:
      summary: Проверка доступности сервиса
      tags:
      - System
      responses:
        '200':
          description: Сервис работает
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/v1/auth/register:
    post:
      summary: Создать аккаунт
      tags:
      - Auth
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Аккаунт создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/auth/login:
    post:
      summary: Войти в систему
      tags:
      - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Успешная аутентификация
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSession'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/auth/refresh:
    post:
      summary: Обновить пару токенов
      tags:
      - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Токены обновлены
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/auth/logout:
    post:
      summary: Выйти из текущей сессии (отозвать refresh токен)
      tags:
      - Auth
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '204':
          description: Сессия завершена
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/auth/logout-all:
    post:
      summary: Завершить все сессии пользователя
      tags:
      - Auth
      security:
      - BearerAuth: []
      responses:
        '204':
          description: Все сессии завершены
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/auth/sessions:
    get:
      summary: Получить список активных сессий пользователя
      tags:
      - Auth
      security:
      - BearerAuth: []
      responses:
        '200':
          description: Список сессий
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SessionInfo'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/auth/me:
    get:
      summary: Получить профиль текущего пользователя
      tags:
      - Auth
      security:
      - BearerAuth: []
      responses:
        '200':
          description: Профиль пользователя
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/users:
    get:
      summary: Получить список пользователей
      tags:
      - Users
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PageSize'
      - in: query
        name: query
        schema:
          type: string
        description: Поиск по имени или email
      responses:
        '200':
          description: Страница со списком пользователей
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUserList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/users/{id}:
    get:
      summary: Получить пользователя по идентификатору
      tags:
      - Users
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Данные пользователя
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    patch:
      summary: Обновить аватар пользователя
      tags:
      - Users
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - avatar
              properties:
                avatar:
                  type: string
                  format: binary
      responses:
        '200':
          description: Аватар обновлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    delete:
      summary: Удалить пользователя
      tags:
      - Users
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Пользователь удален
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/data:
    get:
      summary: Получить список загруженных объектов
      tags:
      - Data
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PageSize'
      - in: query
        name: query
        schema:
          type: string
        description: Поисковая строка
      - in: query
        name: type
        schema:
          type: string
        description: Фильтр по типу файла
      responses:
        '200':
          description: Страница со списком объектов
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedKnowledgeObjectList'
        '204':
          $ref: '#/components/responses/NoContent'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    post:
      summary: Загрузить новые объекты в базу знаний
      tags:
      - Data
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - data
              properties:
                data:
                  type: array
                  items:
                    type: string
                    format: binary
                params:
                  $ref: '#/components/schemas/DataUploadParams'
            encoding:
              params:
                contentType: application/json
      responses:
        '201':
          description: Объекты приняты в обработку
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataUploadResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/data/search:
    get:
      summary: Полнотекстовый / гибридный поиск по чанкам
      tags:
      - Data
      security:
      - BearerAuth: []
      parameters:
      - in: query
        name: q
        required: true
        schema:
          type: string
        description: Поисковый запрос
      - in: query
        name: dataIds
        schema:
          type: array
          items:
            type: string
            format: uuid
        description: Ограничить поиск объектами
      - in: query
        name: limit
        schema:
          type: integer
          default: 10
          maximum: 100
        description: Лимит результатов
      responses:
        '200':
          description: Результаты поиска
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/data/{id}:
    get:
      summary: Получить данные объекта
      tags:
      - Data
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Данные объекта
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeObjectDetails'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    patch:
      summary: Обновить объект
      tags:
      - Data
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items:
                    type: string
                    format: binary
                params:
                  $ref: '#/components/schemas/DataUpdateParams'
            encoding:
              params:
                contentType: application/json
      responses:
        '200':
          description: Объект обновлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeObject'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    delete:
      summary: Удалить объект
      tags:
      - Data
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Объект удален
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/data/{id}/download:
    get:
      summary: Скачать оригинальный файл объекта
      tags:
      - Data
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Файл
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
          headers:
            Content-Disposition:
              schema:
                type: string
              description: attachment; filename="..."
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/data/{id}/reprocess:
    post:
      summary: Перезапустить парсинг и индексацию объекта
      tags:
      - Data
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/Id'
      responses:
        '202':
          description: Объект поставлен в очередь на переработку
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeObject'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/data/ask:
    post:
      summary: Задать вопрос к базе знаний
      tags:
      - Data
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AskRequest'
      responses:
        '200':
          description: Ответ на вопрос
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AskResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/ask/sessions:
    get:
      summary: Получить историю чат-сессий пользователя
      tags:
      - Ask
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Список сессий
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedChatSessionList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v1/ask/feedback:
    post:
      summary: Оставить feedback на ответ ассистента
      tags:
      - Ask
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeedbackRequest'
      responses:
        '204':
          description: Feedback принят
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Id:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
      description: Идентификатор ресурса
    Page:
      in: query
      name: page
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Номер страницы
    PageSize:
      in: query
      name: pageSize
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: Размер страницы
    XRequestId:
      in: header
      name: X-Request-ID
      required: false
      schema:
        type: string
        format: uuid
      description: Идентификатор запроса для трейсинга
    AcceptLanguage:
      in: header
      name: Accept-Language
      required: false
      schema:
        type: string
        default: ru-RU
      description: Предпочтительный язык ответа (LLM / ошибки)
  responses:
    BadRequest:
      description: Некорректный запрос
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Требуется аутентификация
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Недостаточно прав
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Ресурс не найден
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NoContent:
      description: Нет данных
    Conflict:
      description: Конфликт (ресурс уже существует)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    TooManyRequests:
      description: Превышен лимит запросов
      headers:
        Retry-After:
          schema:
            type: integer
          description: Секунд до сброса лимита
        X-RateLimit-Limit:
          schema:
            type: integer
          description: Лимит запросов
        X-RateLimit-Remaining:
          schema:
            type: integer
          description: Оставшихся запросов
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnprocessableEntity:
      description: Ошибка валидации полей
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    PayloadTooLarge:
      description: Размер запроса превышает лимит
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnsupportedMediaType:
      description: Неподдерживаемый формат файла
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServiceUnavailable:
      description: ML-сервис или очередь недоступны
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    HealthResponse:
      type: object
      required:
      - status
      properties:
        status:
          type: string
          example: ok
    AskRequest:
      type: object
      required:
      - message
      properties:
        message:
          type: string
          description: Текст вопроса
        dataIds:
          type: array
          description: Ограничить поиск конкретными объектами
          items:
            type: string
            format: uuid
        sessionId:
          type: string
          format: uuid
          description: ID чат-сессии (опционально)
        temperature:
          type: number
          format: float
          minimum: 0
          maximum: 2
          default: 0.7
          description: Температура генерации LLM
        stream:
          type: boolean
          default: false
          description: Запросить стриминг ответа (HTTP SSE)
    AskResponse:
      type: object
      required:
      - answer
      properties:
        answer:
          type: string
          description: Ответ в markdown, допускается KaTeX-разметка
        citations:
          type: array
          items:
            $ref: '#/components/schemas/Citation'
    Citation:
      type: object
      required:
      - id
      - title
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        chunk:
          type: string
        score:
          type: number
          format: float
    KnowledgeObject:
      type: object
      required:
      - id
      - filename
      - status
      - createdAt
      properties:
        id:
          type: string
          format: uuid
        filename:
          type: string
        originalFilename:
          type: string
        mimeType:
          type: string
        size:
          type: integer
          format: int64
        status:
          type: string
          enum:
          - pending
          - processing
          - ready
          - failed
        errorMessage:
          type: string
          nullable: true
          description: Причина ошибки парсинга (если status=failed)
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        createdBy:
          $ref: '#/components/schemas/UserShort'
    KnowledgeObjectDetails:
      allOf:
      - $ref: '#/components/schemas/KnowledgeObject'
      - type: object
        properties:
          content:
            type: string
            description: Отпарсенное текстовое содержимое
          metadata:
            type: object
            additionalProperties: true
          chunks:
            type: array
            items:
              $ref: '#/components/schemas/KnowledgeChunk'
    KnowledgeChunk:
      type: object
      required:
      - index
      - text
      properties:
        index:
          type: integer
        text:
          type: string
        tokens:
          type: integer
    DataUploadParams:
      type: object
      properties:
        title:
          type: string
        tags:
          type: array
          items:
            type: string
        recursive:
          type: boolean
          default: true
          description: Актуально для zip-архивов
        extractImages:
          type: boolean
          default: false
          description: Извлекать изображения из PDF/DOCX для дальнейшего анализа
        ocrLanguage:
          type: string
          default: rus
          description: Язык OCR для сканированных документов
    DataUpdateParams:
      type: object
      properties:
        title:
          type: string
        tags:
          type: array
          items:
            type: string
    DataUploadResponse:
      type: object
      required:
      - ids
      properties:
        ids:
          type: array
          items:
            type: string
            format: uuid
    RegisterRequest:
      type: object
      required:
      - email
      properties:
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum:
          - admin
          - user
    EmailVerifyRequest:
      type: object
      description: Передайте `email`, чтобы отправить письмо, либо `code`, чтобы подтвердить email.
      properties:
        email:
          type: string
          format: email
        code:
          type: string
      minProperties: 1
    EmailVerifyResponse:
      type: object
      required:
      - status
      properties:
        status:
          type: string
          enum:
          - sent
